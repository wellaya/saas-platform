name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: saasdb_test
        ports: ["5432:5432"]
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: "pnpm" }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @repo/database db:generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/saasdb_test

      - name: Run migrations
        run: pnpm --filter @repo/database exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/saasdb_test

      - name: Lint
        run: pnpm turbo run lint

      - name: Check types
        run: pnpm turbo run check-types

      - name: Build
        run: pnpm turbo run build
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/saasdb_test
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000